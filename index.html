<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>天后宮全螢幕導航</title>
    <style>
        /* 全螢幕地圖設定 */
        html, body, #map {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
        }
        /* 啟動按鈕 */
        #navBtn {
            position: absolute; bottom: 40px; left: 50%;
            transform: translateX(-50%);
            padding: 16px 32px;
            font-size: 18px; font-weight: bold;
            background: #d32f2f; color: white;
            border: none; border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            z-index: 10; cursor: pointer;
        }
    </style>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyC9yd5GeV-J0SHVtpkeHvtFfSryaavAKIE&libraries=geometry,routes"></script>
</head>
<body>

<button id="navBtn" onclick="startNav()">開始導航</button>
<div id="map"></div>

<script>
    const DESTINATION = { lat: 24.059338, lng: 120.43138 }; // 鹿港天后宮
    let map, userMarker, routeLine;

    function initMap() {
        // 1. 初始化地圖
        map = new google.maps.Map(document.getElementById("map"), {
            center: DESTINATION,
            zoom: 16,
            disableDefaultUI: true, 
            zoomControl: false // 追求極簡全螢幕，關閉縮放按鈕
        });

        // 2. 建立預設的紅色圖釘標記
        new google.maps.Marker({
            position: DESTINATION,
            map: map,
            title: "鹿港天后宮" // 預設紅色圖釘
        });
    }

    async function startNav() {
        if (!navigator.geolocation) return alert("您的瀏覽器不支援定位");
        
        document.getElementById("navBtn").style.display = "none";

        // 持續監測位置
        navigator.geolocation.watchPosition((position) => {
            const userPos = {
                lat: position.coords.latitude,
                lng: position.coords.longitude
            };

            updateUser(userPos);
            drawPath(userPos);
            
        }, (err) => {
            alert("請開啟 GPS 定位權限以進行導航");
        }, { enableHighAccuracy: true });
    }

    // 更新使用者位置（藍色小點）
    function updateUser(pos) {
        if (!userMarker) {
            userMarker = new google.maps.Marker({
                position: pos,
                map: map,
                icon: {
                    path: google.maps.SymbolPath.CIRCLE,
                    scale: 8, fillColor: "#4285F4", fillOpacity: 1,
                    strokeColor: "white", strokeWeight: 2
                }
            });
        } else {
            userMarker.setPosition(pos);
        }
    }

    // 繪製導航線
    async function drawPath(origin) {
        const { Route } = google.maps;
        try {
            const result = await Route.computeRoutes({
                origin: origin,
                destination: DESTINATION,
                travelMode: google.maps.TravelMode.WALKING,
                fields: ["path"]
            });
            const path = result.routes[0].path;

            if (routeLine) routeLine.setMap(null);
            
            routeLine = new google.maps.Polyline({
                path: path,
                map: map,
                strokeColor: "#4285F4",
                strokeOpacity: 0.7,
                strokeWeight: 7
            });

            // 調整視角以包含雙方
            const bounds = new google.maps.LatLngBounds();
            bounds.extend(origin);
            bounds.extend(DESTINATION);
            map.fitBounds(bounds, 100);
            
        } catch (e) {
            console.log("計算路線中...");
        }
    }

    window.onload = initMap;
</script>

</body>
</html>
