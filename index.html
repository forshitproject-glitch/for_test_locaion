<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高精準持續定位測試</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        #map { height: 100vh; width: 100%; }
        .custom-control {
            background: #fff; border: 2px solid #fff; border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3); cursor: pointer;
            margin: 10px; padding: 12px 24px; font-size: 16px; font-weight: bold;
            color: #1a73e8; transition: 0.2s;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyC9yd5GeV-J0SHVtpkeHvtFfSryaavAKIE&callback=initMap&v=weekly" defer></script>

    <script>
        let map, infoWindow, accuracyCircle, userMarker;
        let autoUpdateInterval = null;
        let wakeLock = null;

        // --- 螢幕常亮功能 (Wake Lock) ---
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    console.log('螢幕常亮已啟動');
                }
            } catch (err) {
                console.warn(`無法鎖定螢幕常亮: ${err.message}`);
            }
        }

        function releaseWakeLock() {
            if (wakeLock !== null) {
                wakeLock.release();
                wakeLock = null;
                console.log('螢幕常亮已解除');
            }
        }

        // --- 核心定位邏輯 ---
        function initMap() {
            map = new google.maps.Map(document.getElementById("map"), {
                center: { lat: 25.0339, lng: 121.5644 },
                zoom: 17,
                mapTypeControl: false
            });

            infoWindow = new google.maps.InfoWindow();

            const locationButton = document.createElement("button");
            locationButton.textContent = "開始每 5 秒定位";
            locationButton.classList.add("custom-control");
            map.controls[google.maps.ControlPosition.TOP_CENTER].push(locationButton);

            locationButton.addEventListener("click", () => {
                if (autoUpdateInterval) {
                    // 停止
                    clearInterval(autoUpdateInterval);
                    autoUpdateInterval = null;
                    releaseWakeLock();
                    locationButton.textContent = "開始每 5 秒定位";
                    locationButton.style.background = "#fff";
                } else {
                    // 啟動
                    requestWakeLock();
                    locationButton.textContent = "🛑 停止並解除鎖定";
                    locationButton.style.background = "#ffcccc";
                    
                    performLocationUpdate(); 
                    autoUpdateInterval = setInterval(performLocationUpdate, 5000);
                }
            });
        }

        function performLocationUpdate() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const pos = {
                            lat: position.coords.latitude,
                            lng: position.coords.longitude,
                        };
                        const accuracy = position.coords.accuracy;

                        if (accuracyCircle) accuracyCircle.setMap(null);
                        if (userMarker) userMarker.setMap(null);

                        accuracyCircle = new google.maps.Circle({
                            map: map,
                            center: pos,
                            radius: accuracy,
                            fillColor: "#4285F4",
                            fillOpacity: 0.15,
                            strokeColor: "#4285F4",
                            strokeOpacity: 0.5,
                            strokeWeight: 1,
                        });

                        userMarker = new google.maps.Marker({
                            position: pos,
                            map: map,
                            icon: {
                                path: google.maps.SymbolPath.CIRCLE,
                                scale: 7,
                                fillColor: "#4285F4",
                                fillOpacity: 1,
                                strokeColor: "white",
                                strokeWeight: 2
                            }
                        });

                        map.panTo(pos);
                        console.log(`位置更新！誤差：${Math.round(accuracy)} 公尺`);
                    },
                    (error) => {
                        console.error("定位出錯：", error.message);
                    },
                    { 
                        enableHighAccuracy: true, 
                        timeout: 4500, 
                        maximumAge: 0 
                    }
                );
            }
        }

        // --- 補強：切換回分頁時立即更新 ---
        document.addEventListener("visibilitychange", () => {
            if (document.visibilityState === 'visible' && autoUpdateInterval) {
                console.log("偵測到網頁回到前景，補償更新...");
                performLocationUpdate();
            }
        });

        window.initMap = initMap;
    </script>
</body>
</html>
