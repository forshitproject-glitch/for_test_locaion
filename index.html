<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>天后宮直達導航</title>
    <style>
        /* 全螢幕設定 */
        html, body, #map {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
        }
        /* 浮動按鈕：啟動定位與導航 */
        #navBtn {
            position: absolute; bottom: 30px; left: 50%;
            transform: translateX(-50%);
            padding: 15px 30px;
            font-size: 18px; font-weight: bold;
            background: #1a73e8; color: white;
            border: none; border-radius: 50px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 10; cursor: pointer;
        }
    </style>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyC9yd5GeV-J0SHVtpkeHvtFfSryaavAKIE&libraries=geometry,routes"></script>
</head>
<body>

<button id="navBtn" onclick="initNavigation()">開始導航至天后宮</button>
<div id="map"></div>

<script>
    const DESTINATION = { lat: 24.059338, lng: 120.43138 }; // 鹿港天后宮
    let map, userMarker, routeLine;

    function initMap() {
        // 初始地圖中心點
        map = new google.maps.Map(document.getElementById("map"), {
            center: DESTINATION,
            zoom: 16,
            disableDefaultUI: true, // 隱藏多餘控制項，畫面更乾淨
            zoomControl: true
        });

        // 標記天后宮
        new google.maps.Marker({
            position: DESTINATION,
            map: map,
            label: { text: "天后宮", color: "white", fontWeight: "bold" },
            icon: {
                path: google.maps.SymbolPath.BACKWARD_CLOSED_ARROW,
                scale: 6, fillWeight: 2, fillColor: "#D32F2F", fillOpacity: 1
            }
        });
    }

    function initNavigation() {
        if (!navigator.geolocation) return alert("瀏覽器不支援定位");
        
        document.getElementById("navBtn").style.display = "none"; // 點擊後隱藏按鈕

        // 開始追蹤使用者位置
        navigator.geolocation.watchPosition((position) => {
            const userLatLng = {
                lat: position.coords.latitude,
                lng: position.coords.longitude
            };

            updateUserMarker(userLatLng);
            drawRoute(userLatLng);
            
        }, (err) => {
            alert("請開啟 GPS 定位授權");
        }, { enableHighAccuracy: true });
    }

    // 更新使用者在地圖上的藍點
    function updateUserMarker(pos) {
        if (!userMarker) {
            userMarker = new google.maps.Marker({
                position: pos,
                map: map,
                icon: {
                    path: google.maps.SymbolPath.CIRCLE,
                    scale: 10, fillColor: "#4285F4", fillOpacity: 1,
                    strokeColor: "white", strokeWeight: 3
                }
            });
        } else {
            userMarker.setPosition(pos);
        }
    }

    // 繪製並更新導航路線
    async function drawRoute(origin) {
        const { Route } = google.maps;
        const request = {
            origin: origin,
            destination: DESTINATION,
            travelMode: google.maps.TravelMode.WALKING,
            fields: ["path"]
        };

        try {
            const result = await Route.computeRoutes(request);
            const path = result.routes[0].path;

            if (routeLine) routeLine.setMap(null); // 清除舊線條
            
            routeLine = new google.maps.Polyline({
                path: path,
                map: map,
                strokeColor: "#4285F4",
                strokeOpacity: 0.8,
                strokeWeight: 8
            });

            // 如果是第一次定位，自動縮放視角
            if (map.getZoom() < 17) {
                const bounds = new google.maps.LatLngBounds();
                bounds.extend(origin);
                bounds.extend(DESTINATION);
                map.fitBounds(bounds, 50);
            }
        } catch (e) {
            console.log("路線計算中...");
        }
    }

    window.onload = initMap;
</script>

</body>
</html>
