<!DOCTYPE html>

<html lang="zh-Hant">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>具遊戲性質之旅遊網頁</title>



<style>

html, body { margin: 0; padding: 0; }

#app { width: 100%; }

#uiBar {

  padding: 10px;

  background: #ffffff;

  box-shadow: 0 2px 8px rgba(0,0,0,.25);

  font-size: 14px;

  position: sticky;

  top: 0;

  z-index: 10;

}

#uiBar button {

  padding: 8px 12px;

  border-radius: 8px;

  border: none;

  margin-right: 6px;

  margin-bottom: 6px;

  cursor: pointer;

  font-weight: bold;

}

.start-btn { background:#2e7d32; color:#fff; }

.stop-btn { background:#d32f2f; color:#fff; }

.cancel-btn { background:#e0e0e0; }

.full-btn { background:#1976d2; color:#fff; }

.finish-btn { background:#d32f2f; color:#fff; }

#timerBox { font-weight: bold; }

#map { width: 100%; height: 420px; min-height: 420px; }

</style>



<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyC9yd5GeV-J0SHVtpkeHvtFfSryaavAKIE&libraries=geometry,routes"></script>

</head>



<body>

<div id="app">

  <div id="uiBar">

    <button id="geoBtn" class="start-btn" onclick="toggleGeolocation()">啟用定位</button>

    <button class="cancel-btn" onclick="skipGeolocation()">不啟用</button>

    <button class="full-btn" onclick="toggleFullscreen()">全螢幕地圖</button>

    <select id="spotSelect" style="padding:6px;border-radius:6px;">

      <option value="">選擇目的地</option>

    </select>+

    <button class="finish-btn" onclick="finishTrip()">完成行程</button>

    <div id="timerBox">時間：<span id="timer">00:00:00</span></div>

    <div id="status">狀態：尚未開始</div>

  </div>

  <div id="map"></div>

</div>



<script>
function performLocationUpdate() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(
    (p) => {
      const pos = { lat: p.coords.latitude, lng: p.coords.longitude };
      const accuracy = p.coords.accuracy;
      userLatLng = new google.maps.LatLng(pos.lat, pos.lng);
      hasFix = true;

      // 更新使用者位置
      if (!userMarker) {
        userMarker = new google.maps.Marker({ 
          position: pos, 
          map: map, 
          zIndex: 999, 
          icon: { path: google.maps.SymbolPath.CIRCLE, scale: 6, fillColor: "#ff0000", fillOpacity: 1, strokeColor: "#ffffff", strokeWeight: 2 } 
        });
      } else { 
        userMarker.setPosition(pos); 
      }

      // 更新精確度圓圈
      if (!accuracyCircle) {
        accuracyCircle = new google.maps.Circle({ 
          map: map, center: pos, radius: accuracy, fillColor: "#1a73e8", fillOpacity: 0.15, strokeColor: "#1a73e8", strokeOpacity: 0.4, strokeWeight: 1, clickable: false 
        });
      } else { 
        accuracyCircle.setCenter(pos); 
        accuracyCircle.setRadius(accuracy); 
      }

      // 觸發路線進度計算
      updateRouteProgress();

      // 判斷是否進入鹿港 4.2km 範圍
      const d = google.maps.geometry.spherical.computeDistanceBetween(userLatLng, new google.maps.LatLng(LUKANG_CENTER));
      if(!entered && d <= LUKANG_RADIUS){
        entered = true; 
        startTimer(); 
        map.panTo(pos); 
        map.setZoom(16);
        setStatus("已進入鹿港區域，開始計時");
      }
    },
    null, 
    { enableHighAccuracy: true, maximumAge: 0, timeout: 4500 }
  );
}
